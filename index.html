<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D&D Character Sheet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>D&D Character Sheet</h1>

<div class="container">

    <div class="section">
        <h2>Basic Info</h2>
        <input type="text" id="name" placeholder="Character Name">
        <div class="section">
  
    <!-- Class Dropdown -->
    <label>Class</label>
    <select id="class">
        <option value="">-- Select Class --</option>
        <option>Barbarian</option>
        <option>Bard</option>
        <option>Cleric</option>
        <option>Druid</option>
        <option>Fighter</option>
        <option>Monk</option>
        <option>Paladin</option>
        <option>Ranger</option>
        <option>Rogue</option>
        <option>Sorcerer</option>
        <option>Warlock</option>
        <option>Wizard</option>
    </select>

    <!-- Race Dropdown -->
    <label>Race</label>
    <select id="race">
        <option value="">-- Select Race --</option>
        <option>Dragonborn</option>
        <option>Dwarf</option>
        <option>Elf</option>
        <option>Gnome</option>
        <option>Half-Elf</option>
        <option>Half-Orc</option>
        <option>Halfling</option>
        <option>Human</option>
        <option>Tiefling</option>
    </select>

    <!-- Level Dropdown -->
    <label>Level</label>
    <select id="level">
        <option value="">-- Select Level --</option>
        <script>
            for (let i = 1; i <= 20; i++) {
                document.write(`<option value="${i}">${i}</option>`);
            }
        </script>
    </select>

</div>
    
    </div>

    <div class="section">
        <h2>Ability Scores</h2>

    <div class="stat-row">
        <label>Strength</label>

        <input type="number" id="str" onchange="updateModifier('str')">

        <div class="modifier-box">
            <span id="str_mod">0</span>
            <small>Mod</small>
        </div>
            
        <button onclick="rollForStat('str')">🎲 Roll</button>
    </div>

    <div class="stat-row">
        <label>Dexterity </label>

        <input type="number" id="dex" onchange="updateModifier('dex')">

        <div class="modifier-box">
            <span id="dex_mod">0</span>
            <small>Mod</small>
        </div>    
            
        <button onclick="rollForStat('dex')">🎲 Roll</button>
    </div>
     
    <div class="stat-row">
        <label>Constitution </label>

        <input type="number" id="con" onchange="updateModifier('con')">

        <div class="modifier-box">
            <span id="con_mod">0</span>
            <small>Mod</small>
        </div>
        
        <button onclick="rollForStat('com')">🎲 Roll</button>
    </div>
            
    <div class="stat-row">
        <label>Intelligence </label>

        <input type="number" id="int" onchange="updateModifier('int')">

        <div class="modifier-box">
            <span id="int_mod">0</span>
            <small>Mod</small>
        </div>
            
        <button onclick="rollForStat('int')">🎲 Roll</button>
    </div>

    <div class="stat-row">
        <label>Wisdom</label>
            
        <input type="number" id="wis" onchange="updateModifier('wis')">
            
        <div class="modifier-box">    
            <span id="int_mod">0</span>
            <small>Mod</small>
        </div>
        
        <button onclick="rollForStat('wis')">🎲 Roll</button>
    </div>
        
     <div class="stat-row">
        <label>Charisma </label>
            
         <input type="number" id="cha" onchange="updateModifier('cha')">

         <div class="modifier-box">
           <span id="int_mod">0</span>
           <small>Mod</small>
        </div>
           
         <button onclick="rollForStat('cha')">🎲 Roll</button>
     </div>

    <button onclick="saveCharacter()">Save Character</button>
    <button onclick="resetCharacter()">Reset</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
